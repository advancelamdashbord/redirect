<!DOCTYPE html>
<html>
<head>
<script>
async function go() {
  const sheetID = "1u6Fl8wnDF_L588LAO7a0_-zyDs8B7IIUtc5UZA6s9Q0";
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&tq=select%20A%20limit%201`;
  
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));
  const link = json.table.rows[0].c[0].v;

  window.location.href = link;
}
go();
</script>
